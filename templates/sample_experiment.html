<!DOCTYPE html>
<html>
<head>
    <title>Enter sample experiment</title>
    <!-- Add a link to the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        label {
            color: black; /* Set the color to white */
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Enter sample experiment</h1>
    </div>
    <div class="form-container">
            <form action="/sample-experiment" method="post" id="addSampleExperimentForm">
	        <label for="flavorCode">Flavor Code (WBXX):</label>
                <select name="flavorCode" id="flavorCodeSelect">
                    <option value="">View previous flavor codes</option>
                    {% for flavorCode in previous_flavor_codes %}
                    <option value="{{ flavorCode }}"> {{ flavorCode }}</option>
                    {% endfor %}
                </select>
	        <input type="text" name="flavorCode" id="flavorCode" placeholder="New Flavor Code">
                <label for="number_of_bottles">Number of bottles:</label>
                <input type="float" id="number_of_bottles" name="number_of_bottles" placeholder="Enter number of bottles" required>
                <label for="abv">ABV%:</label>
                <input type="float" id="abv" name="abv" placeholder="Enter ABV%" required>
                <label for="bottle_size_ml">Bottle size (ml):</label>
                <input type="number" id="bottle_size_ml" name="bottle_size_ml" placeholder="Enter bottle size" required>
                <label for="notes">Notes:</label>
                <input type="text" id="notes" name="notes" placeholder="Enter notes">
                <button type="submit"> Add Entry</button>
        </form>
    </div>

    <div class="button-container">
        <form action="/back-button-product-tools" method="post" class="form">
            <button type="submit" class="top-right-button">Back to Product tools</button>
        </form>

    </div>

</body>
</html>
