<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistlebird Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF3366;
            --primary-hover: #FF1A4D;
            --secondary-color: #1A1A1A;
            --background-color: #0A0A0A;
            --text-color: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-color: #2A2A2A;
            --card-background: #1A1A1A;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --gradient-start: #FF3366;
            --gradient-end: #FF1A4D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: 
                linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.65) 0%,
                    rgba(40, 40, 40, 0.65) 100%),
                url('https://images.unsplash.com/photo-1527842891421-42eec6e703ea?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat,
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                );
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 50% 50%,
                rgba(255, 51, 102, 0.08) 0%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .nav-bar {
            background-color: transparent;
            padding: 2rem 0;
            width: 100%;
            margin-bottom: 2rem;
        }

        .nav-bar h1 {
            color: var(--text-color);
            margin: 0;
            font-size: 2.5rem;
            background: none;
            -webkit-text-fill-color: var(--text-color);
            text-align: center;
        }

        .main-content {
            width: 100%;
            padding-top: 1rem;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            justify-content: center;
        }

        .form {
            margin: 0;
        }

        .top-right-button {
            width: 100%;
            padding: 1.25rem;
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-right-button:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background-color: rgba(255, 51, 102, 0.1);
        }

        .top-right-button::after {
            content: '→';
            font-size: 1.5rem;
            color: var(--primary-color);
            transition: transform 0.3s ease;
        }

        .top-right-button:hover::after {
            transform: translateX(4px);
        }

        #deleteEntryButton {
            width: 100%;
            padding: 1.25rem;
            background-color: rgba(255, 59, 48, 0.1);
            border: 1px solid #FF3B30;
            border-radius: 12px;
            color: #FF3B30;
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #deleteEntryButton:hover {
            background-color: #FF3B30;
            color: white;
            transform: translateY(-2px);
        }

        #deleteEntryButton::after {
            content: '→';
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        #deleteEntryButton:hover::after {
            transform: translateX(4px);
        }

        #deleteFormContainer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--card-background);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }

        .white-label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-color);
            font-weight: 500;
            font-size: 1.125rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 1rem;
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 1.125rem;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: rgba(255, 51, 102, 0.1);
        }

        @media (max-width: 768px) {
            .nav-bar {
                padding: 0.75rem 0;
                position: sticky;
                top: 0;
                z-index: 100;
                margin-bottom: 1rem;
                background: linear-gradient(to bottom, 
                    var(--background-color) 0%,
                    rgba(10, 10, 10, 0.95) 50%,
                    rgba(10, 10, 10, 0) 100%);
            }

            .main-content {
                padding-top: 0.5rem;
            }

            .container {
                padding: 0.5rem;
            }

            .button-container {
                grid-template-columns: 1fr;
                padding: 0.5rem;
                gap: 0.75rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .nav-bar h1 {
                font-size: 2rem;
            }

            .top-right-button {
                padding: 1rem;
                font-size: 1rem;
            }

            #deleteFormContainer {
                padding: 1.5rem;
                width: 95%;
                margin: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .nav-bar h1 {
                font-size: 1.75rem;
            }

            h1 {
                font-size: 2rem;
            }

            .top-right-button {
                padding: 0.875rem;
                font-size: 0.9375rem;
            }

            #deleteFormContainer {
                padding: 1.25rem;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="container">
            <h1>Whistlebird Home</h1>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
            <div class="button-container">
                <form action="/initialize" method="post" class="form">
                    <button type="submit" class="top-right-button">Initialize database</button>
                </form>

                <form action="/crm" method="post" class="form">
                    <button type="submit" class="top-right-button">CRM</button>
                </form>

                <form action="/supply-chain" method="post" class="form">
                    <button type="submit" class="top-right-button">Supply Chain</button>
                </form>
                
                <form class="form" action="/data-tools" method="post">
                    <button type="submit" class="top-right-button">Data Tools</button>
                </form>

                <form class="form" action="/product-tools" method="post">
                    <button type="submit" class="top-right-button">Product Tools</button>
                </form>

                <form class="form" action="/audit-tools" method="post">
                    <button type="submit" class="top-right-button">Audit Tools</button>
                </form>

                <form class="form" action="/buys-sells" method="post">
                    <button type="submit" class="top-right-button">Buys & Sells</button>
                </form>

                <form class="form" action="/calculation-tools" method="post">
                    <button type="submit" class="top-right-button">Calculation Tools</button>
                </form>

                <form action="/download-csv" method="post" class="form">
                    <button class="top-right-button">Download data to csv</button>
                </form>

                <form class="form" action="/delete-entry" method="post">
                    <button type="submit" id="deleteEntryButton">Delete Entry</button>
                </form>
            </div>
        </div>
    </div>

    <div id="deleteFormContainer" style="display: none;">
        <form action="/delete-entry" method="post" class="form">
            <label for="deleteId" class="white-label">Enter ID to Delete:</label>
            <input type="number" id="deleteId" name="deleteId" required>
            <button type="submit" class="top-right-button">Delete</button>
        </form>
    </div>

    <script>
        document.getElementById("deleteEntryButton").addEventListener("click", function() {
            var deleteFormContainer = document.getElementById("deleteFormContainer");
            deleteFormContainer.style.display = "block";
        });

        // Close the delete form when clicking outside
        window.addEventListener("click", function(event) {
            var deleteFormContainer = document.getElementById("deleteFormContainer");
            if (event.target === deleteFormContainer) {
                deleteFormContainer.style.display = "none";
            }
        });
    </script>
</body>
</html>
