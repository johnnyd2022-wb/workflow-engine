<!DOCTYPE html>
<html>
<head>
    <title>Add ex-stock storage</title>
    <!-- Add a link to the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        label {
            color: black; /* Set the color to white */
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Add ex-stock storage</h1>
    </div>
    <div class="form-container">
        <form action="/add-ex-stock-storage" method="post" id="addExStockStorage">
            <input type="text" name="notes" id="notes" placeholder="Record summary here">
            <label for="bottlesStored">Bottles stored</label>
            <input type="number" id="bottlesStored" name="bottlesStored" min="0" step="0.5" placeholder="Enter bottles stored" required>
            <label for="productName">Product Name</label>
            <select name="productName" id="productName" required>
                <option value="" selected disabled>Select product</option>
                <option value="Wildflower">Wildflower</option>
                <option value="Rosella">Rosella</option>
            </select>
            <label for="storageID">Storage ID</label>
            <input type="text" id="storageID" name="storageID" placeholder="Enter storage ID">
            <button type="submit">Add entry</button>
        </form>
    </div>

    <div class="button-container">
        <form action="/back-button-product-tools" method="post" class="form">
            <button type="submit" class="top-right-button">Back to Product tools</button>
        </form>

    </div>

</body>
</html>
