<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistlebird Product Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF3366;
            --primary-hover: #FF1A4D;
            --secondary-color: #1A1A1A;
            --background-color: #0A0A0A;
            --text-color: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-color: #2A2A2A;
            --card-background: #1A1A1A;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --gradient-start: #FF3366;
            --gradient-end: #FF1A4D;
            --table-header-bg: rgba(255, 51, 102, 0.1);
            --table-row-hover: rgba(255, 51, 102, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: 
                linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.65) 0%,
                    rgba(40, 40, 40, 0.65) 100%),
                url('https://images.unsplash.com/photo-1527842891421-42eec6e703ea?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat,
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                );
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 50% 50%,
                rgba(255, 51, 102, 0.08) 0%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .nav-bar {
            background-color: transparent;
            padding: 2rem 0;
            width: 100%;
            margin-bottom: 2rem;
        }

        .nav-bar h1 {
            color: var(--text-color);
            margin: 0;
            font-size: 2.5rem;
            background: none;
            -webkit-text-fill-color: var(--text-color);
            text-align: center;
        }

        .main-content {
            width: 100%;
            padding-top: 1rem;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin: 2rem 0;
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .calculator-panel {
            background: linear-gradient(145deg, 
                rgba(26, 26, 26, 0.9) 0%,
                rgba(26, 26, 26, 0.8) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            height: 140px;
            width: 100%;
        }

        .calculator-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                transparent 0%,
                rgba(255, 51, 102, 0.03) 50%,
                transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .calculator-panel:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: var(--panel-hover-shadow);
        }

        .calculator-panel:hover::before {
            transform: translateX(100%);
        }

        .calculator-panel .content {
            flex: 1;
            padding-right: 2.5rem;
        }

        .calculator-panel .title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-color);
            line-height: 1.4;
        }

        .calculator-panel .description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .calculator-panel .icon {
            position: absolute;
            top: 1.75rem;
            right: 1.75rem;
            font-size: 1.5rem;
            opacity: 0.5;
            transition: all 0.3s ease;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calculator-panel:hover .icon {
            opacity: 1;
            transform: scale(1.1);
        }

        @media (max-width: 1024px) {
            .button-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .button-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .calculator-panel {
                height: 130px;
            }
        }

        @media (max-width: 480px) {
            .calculator-panel {
                height: 120px;
            }
        }

        .back-button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 4rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .back-button {
            padding: 1.25rem 2.5rem;
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
        }

        .back-button:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background-color: rgba(255, 51, 102, 0.1);
        }

        .back-button::before {
            content: '←';
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .back-button:hover::before {
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="container">
            <h1>Product Tools</h1>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
            <div class="button-container">
                <form action="/flavor-experiment-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Enter flavor experiment</div>
                            <div class="description">Record new flavor experiments and their details</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-flavor-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add flavor</div>
                            <div class="description">Add new flavors to the inventory</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-flavor-to-vat-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add flavor to vat</div>
                            <div class="description">Add flavors to existing vats</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-alcohol-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add alcohol/dilution</div>
                            <div class="description">Record alcohol additions and dilutions</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/bottled-product-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add bottled product</div>
                            <div class="description">Record bottled products in inventory</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-premix-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Enter premix solution</div>
                            <div class="description">Record premix solutions and their details</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-ex-stock-storage-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add ex-stock storage</div>
                            <div class="description">Record ex-stock storage and their details</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/add-distillation-experiment-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Enter distillation experiment</div>
                            <div class="description">Record distillation experiments and results</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/sample-experiment-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Record sample consumption</div>
                            <div class="description">Record sample consumption</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>

                <form action="/create-sample-form" method="post" class="form">
                    <button type="submit" class="calculator-panel">
                        <div class="content">
                            <div class="title">Record new samples</div>
                            <div class="description">Record new samples</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>
                

                <form action="/add-empty-bottles-form" method="get" class="form">
                    <button id="addEmptyBottlesButton" class="calculator-panel">
                        <div class="content">
                            <div class="title">Add empty bottles</div>
                            <div class="description">Add empty bottles to inventory</div>
                        </div>
                        <div class="icon">→</div>
                    </button>
                </form>
            </div>

            <div class="back-button-container">
                <form action="/back-button" method="post" class="form">
                    <button type="submit" class="back-button">Back to main menu (Home)</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("addEmptyBottlesButton").addEventListener("click", function() {
            var emptyBottlesFormContainer = document.getElementById("emptyBottlesFormContainer");
            emptyBottlesFormContainer.style.display = "block";
        });
    
        document.getElementById("submitEmptyBottles").addEventListener("click", function() {
            var supplierSelect = document.getElementById("supplierSelect");
            if (supplierSelect.value === "" && document.querySelector('input[name="new_supplier"]').value === "") {
                alert("Please select a supplier or enter a new supplier.");
                return false;
            }
        });
    </script>
</body>
</html>
