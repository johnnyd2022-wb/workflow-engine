<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customs Lodgements</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF3366;
            --primary-hover: #FF1A4D;
            --secondary-color: #1A1A1A;
            --background-color: #0A0A0A;
            --text-color: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-color: #2A2A2A;
            --card-background: #1A1A1A;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --gradient-start: #FF3366;
            --gradient-end: #FF1A4D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: 
                linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.65) 0%,
                    rgba(40, 40, 40, 0.65) 100%),
                url('https://images.unsplash.com/photo-1527842891421-42eec6e703ea?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat,
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                );
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 50% 50%,
                rgba(255, 51, 102, 0.08) 0%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .nav-bar {
            background-color: transparent;
            padding: 2rem 0;
            width: 100%;
            margin-bottom: 2rem;
        }

        .nav-bar h1 {
            color: var(--text-color);
            margin: 0;
            font-size: 2.5rem;
            background: none;
            -webkit-text-fill-color: var(--text-color);
            text-align: center;
        }

        .main-content {
            width: 100%;
            padding-top: 1rem;
        }

        .card {
            background: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .card-body {
            padding: 2rem;
        }

        .form-label {
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-select, .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-select:focus, .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255, 51, 102, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
            display: block;
            width: fit-content;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.3);
        }

        .row.mb-3 {
            margin-bottom: 1.5rem;
        }

        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .back-button {
            padding: 1.25rem 2.5rem;
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-button:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background-color: rgba(255, 51, 102, 0.1);
        }

        .back-button::before {
            content: '←';
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .back-button:hover::before {
            transform: translateX(-4px);
        }

        @media (max-width: 768px) {
            .nav-bar {
                padding: 0.75rem 0;
                position: sticky;
                top: 0;
                z-index: 100;
                margin-bottom: 1rem;
                background: linear-gradient(to bottom, 
                    var(--background-color) 0%,
                    rgba(10, 10, 10, 0.95) 50%,
                    rgba(10, 10, 10, 0) 100%);
            }

            .main-content {
                padding-top: 0.5rem;
            }

            .container {
                padding: 0.5rem;
            }

            .nav-bar h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 1.5rem;
            }

            .form-label {
                font-size: 1rem;
            }

            .form-select, .form-control {
                padding: 0.625rem 0.875rem;
                font-size: 0.9375rem;
            }

            .btn-primary {
                padding: 0.875rem 1.75rem;
                font-size: 1rem;
            }

            .back-button {
                padding: 0.875rem 1.75rem;
                font-size: 0.9375rem;
            }
        }

        @media (max-width: 480px) {
            .nav-bar h1 {
                font-size: 1.75rem;
            }

            .card-body {
                padding: 1rem;
            }

            .form-label {
                font-size: 0.9375rem;
            }

            .form-select, .form-control {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }

            .btn-primary {
                padding: 0.75rem 1.5rem;
                font-size: 0.9375rem;
            }

            .back-button {
                padding: 0.75rem 1.5rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="container">
            <h1>Customs Lodgements</h1>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
            <div class="card">
                <div class="card-body">
                    <form action="{{ url_for('customs_lodgements') }}" method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="date_period" class="form-label">Date Period</label>
                                <select class="form-select" id="date_period" name="date_period" required>
                                    <option value="">Select Month and Year</option>
                                    {% for year in range(2023, 2031) %}
                                        {% for month in range(1, 13) %}
                                            <option value="{{ year }}-{{ '%02d'|format(month) }}">{{ month }}/{{ year }}</option>
                                        {% endfor %}
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="lodged_volume" class="form-label">Lodged Volume (Litres)</label>
                                <input type="number" class="form-control" id="lodged_volume" name="lodged_volume" step="0.01" required>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="lodged_abv" class="form-label">Lodged ABV (%)</label>
                                <input type="number" class="form-control" id="lodged_abv" name="lodged_abv" step="0.01" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary">Submit</button>
                    </form>
                </div>
            </div>

            <div class="button-container">
                <form action="/back-button-audit-tools" method="post">
                    <button type="submit" class="back-button">Back to Audit Tools</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
