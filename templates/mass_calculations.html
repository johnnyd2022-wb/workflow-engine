<!DOCTYPE html>
<html>
<head>
    <!-- Add a link to the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        label {
            color: black; /* Set the color to black */
        }
    </style>
    <title>Mass calculations</title>
</head>
<body>
    <div class="container">
    <h1>Mass calculations</h1>
    </div>
    <div class="form-container">
        <form id="massCalculationsForm">
            <label for="ethanol_temp">Enter temperature of ethanol in Celsius:</label>
            <input type="number" id="ethanol_temp" step="0.01" required><br><br>

            <label for="water_temp">Enter temperature of water in Celsius:</label>
            <input type="number" id="water_temp" step="0.01" required><br><br>

            <input type="button" value="Calculate" onclick="calculateMass()">
        </form>

        <div id="result_ethanolMass"></div>
        <div id="result_waterMass"></div>
    </div>

    <script>
        function adjust_ethanol_density(initial_ethanol_density, initial_ethanol_temperature, new_ethanol_temperature, beta_ethanol) {
            var adjusted_ethanol_density = initial_ethanol_density / (1 + beta_ethanol * (new_ethanol_temperature - initial_ethanol_temperature));
            return adjusted_ethanol_density;
        }

        function adjust_water_density(initial_water_density, initial_water_temperature, new_water_temperature, beta_water) {
            var adjusted_water_density = initial_water_density / (1 + beta_water * (new_water_temperature - initial_water_temperature));
            return adjusted_water_density;
        }

        function calculate_mass(ethanol_density, water_density, target_ethanol_volume, target_water_volume) {
            var ethanol_mass = target_ethanol_volume * ethanol_density;  // mass in kg
            var water_mass = target_water_volume * water_density;  // mass in kg
            return [ethanol_mass, water_mass];
        }

        function calculateMass() {
            var initial_ethanol_density_20C = 0.8056;
            var initial_ethanol_temperature = 20;
            var beta_ethanol = 1.1e-3;

            var initial_water_density_20C = 1.0;
            var initial_water_temperature = 20;
            var beta_water = 2.1e-4;

            var target_ethanol_volume = 30.389;
            var target_water_volume = 36.191;

            var ethanol_temp = parseFloat(document.getElementById("ethanol_temp").value);
            var water_temp = parseFloat(document.getElementById("water_temp").value);

            if (isNaN(ethanol_temp) || isNaN(water_temp)) {
                alert("Please enter valid numeric values.");
                return;
            }

            var adjusted_ethanol_density = adjust_ethanol_density(initial_ethanol_density_20C, initial_ethanol_temperature, ethanol_temp, beta_ethanol);
            var adjusted_water_density = adjust_water_density(initial_water_density_20C, initial_water_temperature, water_temp, beta_water);

            var mass = calculate_mass(adjusted_ethanol_density, adjusted_water_density, target_ethanol_volume, target_water_volume);
            var ethanol_mass = mass[0];
            var water_mass = mass[1];

            document.getElementById("result_ethanolMass").innerHTML = "Mass of Ethanol: " + ethanol_mass.toFixed(4) + " kg";
            document.getElementById("result_waterMass").innerHTML = "Mass of Water: " + water_mass.toFixed(4) + " kg";
        }
    </script>

    <div class="button-container">
        <form action="/back-button-calculations" method="post" class="form">
            <button type="submit" class="top-right-button">Back to calculators</button>
        </form>
    </div>

</body>
</html>
