<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF3366;
            --primary-hover: #FF1A4D;
            --secondary-color: #1A1A1A;
            --background-color: #0A0A0A;
            --text-color: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-color: #2A2A2A;
            --card-background: #1A1A1A;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --gradient-start: #FF3366;
            --gradient-end: #FF1A4D;
            --table-header-bg: rgba(255, 51, 102, 0.1);
            --table-row-hover: rgba(255, 51, 102, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: 
                linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.65) 0%,
                    rgba(40, 40, 40, 0.65) 100%),
                url('https://images.unsplash.com/photo-1527842891421-42eec6e703ea?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat,
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 8px
                );
            color: var(--text-color);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-color);
            text-align: center;
        }

        .form-container {
            background: var(--card-background);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            max-width: 600px;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        label {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-color);
        }

        input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--secondary-color);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            padding: 1rem 2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .back-button {
            padding: 0.75rem 1.5rem;
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-button:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background-color: rgba(255, 51, 102, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add New Product</h1>
        
        <div class="form-container">
            <form action="/add-product" method="post">
                <div>
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="productName" required>
                </div>
                
                <div>
                    <label for="productSize">Product Size (ml)</label>
                    <input type="number" id="productSize" name="productSize" required>
                </div>
                
                <div>
                    <label for="productAbv">Product ABV (%)</label>
                    <input type="number" step="0.1" id="productAbv" name="productAbv" required>
                </div>
                
                <button type="submit">Add Product</button>
            </form>
        </div>

        <div class="button-container">
            <form action="/back-button-product-tools" method="post">
                <button type="submit" class="back-button">Back to Product Tools</button>
            </form>
        </div>
    </div>
</body>
</html>
