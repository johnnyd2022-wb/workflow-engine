<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View expired ingredients</title>
    <!-- Add a link to the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles_raw_data.css') }}">
</head>
<body>
    <div class="container">
        <h1>View expired ingredients</h1>
        <table class="data-table">
            <thead>
                <tr>
		    <th>ID</th>
		    <th>Date entered</th>
		    <th>Supplier</th>
		    <th>Ingredients</th>
                    <th>Ingredients amount</th>
                    <th>Ingredients code</th>
		    <th>Ingredients Expiry</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
		    <td>{{ row[5] }}</td>
		    <td>{{ row[6] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="button-container">
        <form action="/back-button-data-tools" method="post" class="form">
            <button type="submit" class="top-right-button">Back to Data tools</button>
        </form>

    </div>

</body>
</html>
