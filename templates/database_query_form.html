<!DOCTYPE html>
<html>
<head>
    <!-- Add a link to the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        label {
            color: black; /* Set the color to black */
        }
    </style>
    <title>Readonly Database Query</title>
</head>
<body>
    <div class="container">
    <h1>Readonly Database Query</h1>
    </div>

    <div class="form-container">
        <form id="databaseQueryForm" method="POST" action="/database-query">
            <label for="databaseQuery">Type database query below</label>
            <textarea name="sql_query" rows="5" cols="50"></textarea><br><br>
            <button type="submit">Run query</button>
        </form>

    </div>

    <div class="button-container">
        <form action="/back-button-data-tools" method="post" class="form">
            <button type="submit" class="top-right-button">Back to Data Tools</button>
        </form>
    </div>

</body>
</html>
