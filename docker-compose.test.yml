version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: workflow-engine-test-db
    environment:
      POSTGRES_USER: workflow_rw
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: workflow-engine-test
    ports:
      - "8401:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_rw"]
      interval: 10s
      retries: 5

volumes:
  db_data: