# Pre-commit hooks configuration
# Install with: pip install pre-commit && pre-commit install
# Or with uv: uv pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version - update this periodically
    rev: v0.1.15
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format
        args: [--line-length=120]

  # Added by ci-gate: fast local mirror of the gitleaks/semgrep CI jobs, so secrets and
  # obvious findings are caught before push, not just in the pipeline.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (changed files)
        entry: semgrep scan --config .semgrep/rules/ --error
        language: system
        types: [python]
        pass_filenames: false

