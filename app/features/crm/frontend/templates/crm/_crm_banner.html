<div class="spa-hub-yellow-sleeve">
  <div class="inventory-spa-header-wrap inventory-hub-banner-wrap">
    <div class="inventory-spa-header__banner" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 88" fill="none" aria-hidden="true" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;height:auto;max-height:120px;">
        <defs>
          <linearGradient id="crm-line-a" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#14b8a6"/>
          </linearGradient>
          <linearGradient id="crm-line-b" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#14b8a6"/>
            <stop offset="100%" stop-color="#22c55e"/>
          </linearGradient>
          <linearGradient id="crm-node-a" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#2563eb"/>
          </linearGradient>
          <linearGradient id="crm-node-b" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2dd4bf"/>
            <stop offset="100%" stop-color="#0f766e"/>
          </linearGradient>
          <linearGradient id="crm-node-c" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ade80"/>
            <stop offset="100%" stop-color="#15803d"/>
          </linearGradient>
          <filter id="crm-soft" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-opacity="0.14"/>
          </filter>
        </defs>
        <ellipse cx="100" cy="78" rx="88" ry="6" fill="#0f172a" opacity="0.06"/>
        <path d="M28 52 C 55 36, 75 60, 100 52" stroke="url(#crm-line-a)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9" stroke-dasharray="5,3"/>
        <path d="M100 52 C 125 44, 145 68, 172 52" stroke="url(#crm-line-b)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9" stroke-dasharray="5,3"/>
        <g filter="url(#crm-soft)">
          <circle cx="28" cy="52" r="16" fill="url(#crm-node-a)"/>
          <circle cx="100" cy="52" r="18" fill="url(#crm-node-b)"/>
          <circle cx="172" cy="52" r="16" fill="url(#crm-node-c)"/>
        </g>
        <path d="M23 53l5-9 5 9h-3l2 8h-8l2-8h-3z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round" opacity="0.92"/>
        <circle cx="100" cy="52" r="7" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.92"/>
        <path d="M100 47v10M95.5 50h9M96 55h8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.92"/>
        <rect x="165" y="46" width="14" height="12" rx="2.5" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.92"/>
        <path d="M165 50h14M168 46v-2.5M176 46v-2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.92"/>
      </svg>
    </div>
  </div>
</div>

<section class="spa-form-section spa-page-hero crm-hero" aria-labelledby="crm-page-title">
  <h1 class="page-title" id="crm-page-title">{{ crm_heading or "CRM" }}</h1>
  <p class="page-subtitle">{{ crm_subtitle or "Sales performance and customer insights" }}</p>
</section>
