<!-- Shared Sidebar Component - V2 Modern Design -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/>
        </svg>
      </div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">SupplyChain</span>
        <span class="sidebar-logo-subtitle">Business intelligence and compliance automation</span>
      </div>
    </div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="nav-label">Navigation</div>
    <ul class="nav-list">
      <li class="nav-item">
        <a href="/workflow-engine/dashboard" class="nav-link{% if active_page == 'dashboard' %} active{% endif %}">
          <div class="nav-link-icon-wrapper">
            <svg class="nav-link-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <span class="nav-link-text">Dashboard</span>
          <svg class="nav-link-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </li>
      <li class="nav-item">
        <a href="/core" class="nav-link{% if active_page == 'core' %} active{% endif %}">
          <div class="nav-link-icon-wrapper">
            <svg class="nav-link-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6m9.66-9L16 12m-6 0L4.34 9M19.66 18L16 12m-6 0L4.34 18"/>
            </svg>
          </div>
          <span class="nav-link-text">Core</span>
          <svg class="nav-link-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </li>
      <li class="nav-item">
        <a href="/workflow-engine/compliance" class="nav-link{% if active_page == 'compliance' %} active{% endif %}">
          <div class="nav-link-icon-wrapper">
            <svg class="nav-link-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span class="nav-link-text">Compliance</span>
          <svg class="nav-link-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </li>
      <li class="nav-item">
        <a href="/workflow-engine/integrations" class="nav-link{% if active_page == 'integrations' %} active{% endif %}">
          <div class="nav-link-icon-wrapper">
            <svg class="nav-link-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <span class="nav-link-text">Integrations</span>
          <svg class="nav-link-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </li>
      <li class="nav-item">
        <a href="/workflow-engine/settings" class="nav-link{% if active_page == 'settings' %} active{% endif %}">
          <div class="nav-link-icon-wrapper">
            <svg class="nav-link-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6"/>
              <path d="M1 12h6m6 0h6"/>
            </svg>
          </div>
          <span class="nav-link-text">Settings</span>
          <svg class="nav-link-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>
  
  <div class="sidebar-footer">
    <!-- Account Info Component Container -->
    <div id="account-info-container">
      <div id="account-info-component">
        <div style="padding: 16px; background: hsl(220, 20%, 12%); border-radius: var(--radius-lg); border: 1px solid var(--sidebar-divider);">
          <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-inverse);">Account Information</h3>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div style="display: flex; align-items: flex-start; gap: 8px;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--sidebar-label); flex-shrink: 0; margin-top: 2px;">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <div style="display: flex; flex-direction: column; min-width: 0; flex: 1;">
                <span style="color: var(--sidebar-label); font-size: 11px; margin-bottom: 4px;">User</span>
                <span id="account-info-email" style="font-weight: 500; font-size: 13px; color: hsl(210, 20%, 90%); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;">Loading...</span>
              </div>
            </div>
            <div style="display: flex; align-items: flex-start; gap: 8px;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--sidebar-label); flex-shrink: 0; margin-top: 2px;">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
              <div style="display: flex; flex-direction: column; min-width: 0; flex: 1;">
                <span style="color: var(--sidebar-label); font-size: 11px; margin-bottom: 4px;">Org</span>
                <span id="account-info-org" style="font-weight: 500; font-size: 13px; color: hsl(210, 20%, 90%); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;">Loading...</span>
              </div>
            </div>
          </div>
          <button 
            id="account-info-logout-btn" 
            onclick="handleAccountInfoLogout()" 
            style="width: 100%; margin-top: 12px; padding: 8px 16px; border-radius: var(--radius-md); background: hsl(220, 20%, 15%); border: 1px solid var(--sidebar-divider); color: var(--text-inverse); font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition-fast);"
            onmouseover="this.style.background='hsl(220, 20%, 18%)'"
            onmouseout="this.style.background='hsl(220, 20%, 15%)'"
          >
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Hamburger Toggle Button - Centered and Overlapping -->
  <button class="sidebar-toggle-btn" onclick="toggleSidebar();" aria-label="Toggle sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</aside>
