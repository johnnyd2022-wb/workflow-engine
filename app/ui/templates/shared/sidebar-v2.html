  <div class="sidebar-footer">
    <button
      type="button"
      id="sidebar-logout-btn"
      onclick="if (window.handleAccountInfoLogout) { handleAccountInfoLogout(); } else { window.location.href='/'; }"
      style="width: 100%; margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.05); border: none; color: var(--text-inverse); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 120ms ease;"
      onmouseover="this.style.background='rgba(255, 255, 255, 0.085)'"
      onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'"
      aria-label="Logout"
    >
      Logout
    </button>
  </div>
