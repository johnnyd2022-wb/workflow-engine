{# Process overview only — same banner shell + dimensions as inventory/process hub; unique pipeline illustration #}
<div class="inventory-spa-header-wrap inventory-hub-banner-wrap">
  <div class="inventory-spa-header__banner" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 88" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="pov-rail" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="50%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#0ea5e9"/>
        </linearGradient>
        <linearGradient id="pov-step-1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#ea580c"/>
        </linearGradient>
        <linearGradient id="pov-step-2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="pov-step-3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#2dd4bf"/>
          <stop offset="100%" stop-color="#0d9488"/>
        </linearGradient>
        <linearGradient id="pov-step-4" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <filter id="pov-soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
        </filter>
      </defs>
      <ellipse cx="100" cy="78" rx="88" ry="6" fill="#0f172a" opacity="0.06"/>
      <!-- Connector rail -->
      <path d="M22 56 L178 56" stroke="url(#pov-rail)" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
      <!-- Step blocks (linear pipeline) -->
      <g filter="url(#pov-soft)">
        <rect x="14" y="32" width="34" height="24" rx="5" fill="url(#pov-step-1)"/>
        <rect x="58" y="32" width="34" height="24" rx="5" fill="url(#pov-step-2)"/>
        <rect x="102" y="32" width="34" height="24" rx="5" fill="url(#pov-step-3)"/>
        <rect x="146" y="32" width="34" height="24" rx="5" fill="url(#pov-step-4)"/>
      </g>
      <!-- Chevrons between steps -->
      <g fill="#94a3b8" opacity="0.78">
        <path d="M50 41 L54 44 L50 47 Z"/>
        <path d="M94 41 L98 44 L94 47 Z"/>
        <path d="M138 41 L142 44 L138 47 Z"/>
      </g>
      <!-- Step markers -->
      <circle cx="31" cy="44" r="3.2" fill="#fff" opacity="0.92"/>
      <circle cx="75" cy="44" r="3.2" fill="#fff" opacity="0.92"/>
      <circle cx="119" cy="44" r="3.2" fill="#fff" opacity="0.92"/>
      <circle cx="163" cy="44" r="3.2" fill="#fff" opacity="0.92"/>
    </svg>
  </div>
</div>
