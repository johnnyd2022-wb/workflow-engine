{# Same layout classes as inventory hub banner; different illustration (workflow / trace) #}
<div class="inventory-spa-header-wrap inventory-hub-banner-wrap">
  <div class="inventory-spa-header__banner" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 88" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="proc-line" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
        <linearGradient id="proc-node-a" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#4f46e5"/>
        </linearGradient>
        <linearGradient id="proc-node-b" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#34d399"/>
          <stop offset="100%" stop-color="#059669"/>
        </linearGradient>
        <linearGradient id="proc-node-c" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <filter id="proc-soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
        </filter>
      </defs>
      <ellipse cx="100" cy="78" rx="88" ry="6" fill="#0f172a" opacity="0.06"/>
      <path d="M28 52 C 55 38, 75 38, 100 48 C 125 58, 145 38, 172 52" stroke="url(#proc-line)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
      <g filter="url(#proc-soft)">
        <circle cx="28" cy="52" r="14" fill="url(#proc-node-a)"/>
        <circle cx="100" cy="48" r="16" fill="url(#proc-node-b)"/>
        <circle cx="172" cy="52" r="14" fill="url(#proc-node-c)"/>
      </g>
      <circle cx="28" cy="52" r="4" fill="#fff" opacity="0.9"/>
      <circle cx="100" cy="48" r="5" fill="#fff" opacity="0.9"/>
      <circle cx="172" cy="52" r="4" fill="#fff" opacity="0.9"/>
    </svg>
  </div>
</div>
