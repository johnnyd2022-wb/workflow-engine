<!-- System findings banner: shared across flows2 and core2. Requires system-findings-banner.js and CoreAPI. -->
<style>
  .system-findings-banner {
    background: linear-gradient(135deg, hsl(38, 92%, 50%, 0.12) 0%, hsl(25, 95%, 53%, 0.08) 100%);
    border-bottom: 1px solid hsl(38, 92%, 50%, 0.35);
    margin: 0;
    padding: 0;
  }
  .system-findings-banner__header {
    display: flex;
    align-items: center;
    gap: 10px 16px;
    flex-wrap: wrap;
    padding: 10px 16px 10px 16px;
    max-width: 1200px;
    margin: 0 auto;
    min-height: 44px;
    box-sizing: border-box;
  }
  .system-findings-banner__icon {
    font-size: 1.25rem;
    color: hsl(38, 92%, 40%);
    flex-shrink: 0;
    line-height: 1;
  }
  .system-findings-banner__title {
    flex: 1;
    min-width: 0;
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
    line-height: 1.4;
  }
  .system-findings-banner__toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    width: 44px;
    height: 44px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--text-secondary, #6b7280);
    cursor: pointer;
    border-radius: var(--radius-md, 6px);
    flex-shrink: 0;
    transition: transform 0.2s, background 0.15s;
  }
  .system-findings-banner__toggle:hover {
    background: rgba(0, 0, 0, 0.06);
    color: var(--text-primary, #1a1a1a);
  }
  .system-findings-banner__toggle[aria-expanded="false"] .system-findings-banner__chevron {
    transform: rotate(-90deg);
  }
  .system-findings-banner__chevron {
    transition: transform 0.2s;
  }
  .system-findings-banner__actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .system-findings-banner__body {
    padding: 0 16px 12px 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .system-findings-banner__body[hidden] {
    display: none;
  }
  .system-findings-list {
    margin: 0;
    padding-left: 20px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-primary, #1a1a1a);
  }
  .system-findings-list li {
    margin-bottom: 4px;
  }
  .system-findings-list li:last-child {
    margin-bottom: 0;
  }
  .system-findings-banner__hint {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-secondary, #6b7280);
  }
  .system-findings-untracked-item__reconcile-link:hover {
    text-decoration: underline;
  }
  /* Reconcile modal: centered, compact (square-ish), responsive */
  .system-findings-reconcile-modal {
    position: fixed;
    inset: 0;
    z-index: 1100;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    box-sizing: border-box;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    overflow-y: auto;
    align-items: center;
    justify-content: center;
  }
  .system-findings-reconcile-modal__card {
    width: 100%;
    max-width: 360px;
    max-height: 85vh;
    margin: auto;
    background: var(--bg-primary, #fff);
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    padding: 20px;
    box-sizing: border-box;
    flex-shrink: 0;
  }
  .system-findings-reconcile-modal__title {
    margin: 0 0 12px 0;
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary, #1a1a1a);
    line-height: 1.3;
  }
  .system-findings-reconcile-modal__body {
    margin: 0 0 20px 0;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-secondary, #6b7280);
  }
  .system-findings-reconcile-modal__actions {
    display: flex;
    flex-direction: row;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .system-findings-reconcile-modal__actions .btn {
    min-height: 44px;
    min-width: 44px;
    padding: 10px 18px;
    font-size: 15px;
    border-radius: 8px;
  }
  @media (min-width: 480px) {
    .system-findings-reconcile-modal {
      padding: 24px;
    }
    .system-findings-reconcile-modal__card {
      max-width: 400px;
      padding: 24px;
    }
    .system-findings-reconcile-modal__title {
      font-size: 1.25rem;
      margin-bottom: 14px;
    }
    .system-findings-reconcile-modal__body {
      font-size: 15px;
      margin-bottom: 24px;
    }
  }
  @media (min-width: 600px) {
    .system-findings-banner__header {
      padding: 12px 24px 12px 24px;
    }
    .system-findings-banner__body {
      padding: 0 24px 14px 24px;
    }
    .system-findings-banner__title {
      font-size: 15px;
    }
    .system-findings-list {
      font-size: 14px;
    }
  }
</style>
<div id="system-findings-banner" class="system-findings-banner" role="alert" aria-live="polite" style="display: none;">
  <div class="system-findings-banner__header">
    <span class="system-findings-banner__icon" aria-hidden="true">⚠</span>
    <h2 class="system-findings-banner__title">System findings</h2>
    <button type="button" id="system-findings-banner-toggle" class="system-findings-banner__toggle" aria-expanded="false" aria-controls="system-findings-banner-body" title="Expand or collapse findings">
      <svg class="system-findings-banner__chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="system-findings-banner__actions">
      <button type="button" id="system-findings-banner-ignore-today" class="btn btn-secondary btn-sm">Ignore for today</button>
      <button type="button" id="system-findings-banner-dismiss" class="btn btn-ghost btn-sm">Dismiss</button>
    </div>
  </div>
  <div id="system-findings-banner-body" class="system-findings-banner__body" hidden>
    <ul id="system-findings-list" class="system-findings-list"></ul>
    <p class="system-findings-banner__hint">Review in Source Map or Inventory.</p>
  </div>
</div>
<!-- Reconcile untracked item modal: shown when user clicks "Click here to reconcile untracked item" -->
<div id="system-findings-reconcile-modal" class="system-findings-reconcile-modal" role="dialog" aria-labelledby="system-findings-reconcile-modal-title" aria-modal="true" style="display: none;">
  <div class="system-findings-reconcile-modal__card">
    <h3 id="system-findings-reconcile-modal-title" class="system-findings-reconcile-modal__title">Reconcile untracked item</h3>
    <p id="system-findings-reconcile-modal-body" class="system-findings-reconcile-modal__body"></p>
    <div class="system-findings-reconcile-modal__actions">
      <button type="button" id="system-findings-reconcile-modal-cancel" class="btn btn-ghost btn-sm">Cancel</button>
      <button type="button" id="system-findings-reconcile-modal-go" class="btn btn-primary btn-sm">Go to process</button>
    </div>
  </div>
</div>
