<!-- Execute Step Modal -->
<div class="modal-overlay" id="execute-step-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto;">
  <div class="card" style="max-width: 700px; width: 90%; padding: 24px; margin: 24px auto; max-height: 90vh; overflow-y: auto;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
      <h2 style="font-size: 20px; font-weight: 600; color: var(--text-primary);">Execute Step: <span id="execute-step-name">Unknown</span></h2>
      <button onclick="document.getElementById('execute-step-modal').style.display='none'; document.body.style.overflow='auto';" style="padding: 8px; border: none; background: transparent; color: var(--text-tertiary); cursor: pointer; border-radius: var(--radius-md);">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    
    <!-- Step Documentation (SOP) – read-only reference -->
    <div id="execute-docs-section" style="margin-bottom: 32px; display: none;">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border-default);">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          <line x1="8" y1="7" x2="16" y2="7"></line>
          <line x1="8" y1="11" x2="16" y2="11"></line>
        </svg>
        Documentation
      </h3>
      <div id="execute-docs-container">
        <!-- Step SOP (file links + inline plain text) rendered here -->
      </div>
    </div>
    
    <!-- Confirm inputs Section -->
    <div id="exec-section-inputs" style="margin-bottom: 32px;">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border-default);">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
          <path d="M12 5v14M5 12l7-7 7 7"/>
        </svg>
        Confirm inputs
      </h3>
      <div id="execute-inputs-container">
        <!-- Variable inputs will be rendered here -->
      </div>
    </div>
    
    <!-- Compliance + traceability Section -->
    <div id="exec-section-compliance" style="margin-bottom: 32px;">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border-default);">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Compliance and traceability
      </h3>
      <div id="execute-prompts-container">
        <!-- Execution prompts will be rendered here -->
      </div>
    </div>
    
    <!-- Confirm outputs Section -->
    <div id="exec-section-outputs" style="margin-bottom: 32px;">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border-default);">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
          <path d="M12 19V5M5 12l7 7 7-7"/>
        </svg>
        Confirm outputs
      </h3>
      <div id="execute-outputs-container">
        <!-- Variable outputs will be rendered here -->
      </div>
    </div>
    
    <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('execute-step-modal').style.display='none'; document.body.style.overflow='auto';">Cancel</button>
      <button type="button" id="execute-step-submit-btn" class="btn btn-primary" onclick="submitExecution()">Complete Step</button>
    </div>
  </div>
</div>

<!-- Add untracked output (lightweight modal when recording missing output during execution) -->
<div class="modal-overlay" id="add-untracked-output-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 1001; align-items: center; justify-content: center;">
  <div class="card" style="max-width: 440px; width: 90%; padding: 24px;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
      <h2 style="font-size: 18px; font-weight: 600; color: var(--text-primary);">Add untracked output</h2>
      <button type="button" onclick="document.getElementById('add-untracked-output-modal').style.display='none'; document.body.style.overflow='auto';" style="padding: 8px; border: none; background: transparent; color: var(--text-tertiary); cursor: pointer; border-radius: var(--radius-md);">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <form id="add-untracked-output-form" onsubmit="return false;">
      <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px;">
        <div>
          <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Name</label>
          <input type="text" id="untracked-output-name" name="name" required style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Quantity</label>
            <input type="number" id="untracked-output-quantity" name="quantity" required step="0.01" min="0" style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
          </div>
          <div>
            <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Unit</label>
            <select id="untracked-output-unit" name="unit" required style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
              <option value="kg">kg</option>
              <option value="g">g</option>
              <option value="L">L</option>
              <option value="mL">mL</option>
              <option value="pcs">pcs</option>
              <option value="units">units</option>
            </select>
          </div>
        </div>
        <div>
          <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Date</label>
          <input type="date" id="untracked-output-date" name="date" style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
        </div>
        <div>
          <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Inventory type</label>
          <select id="untracked-output-inventory-type" name="inventory_type" required style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
            <option value="work_in_progress">Work in progress</option>
            <option value="final_product">Final product</option>
          </select>
        </div>
        <div>
          <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px;">Notes <span style="color: var(--error, #ef4444);">*</span></label>
          <textarea id="untracked-output-notes" name="notes" required rows="3" placeholder="e.g. why this item was added without full traceability" style="width: 100%; padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px; resize: vertical; min-height: 72px;"></textarea>
        </div>
      </div>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('add-untracked-output-modal').style.display='none'; document.body.style.overflow='auto';">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Ready date confirmation: use product not yet ready? (styled system modal, replaces browser confirm) -->
<div class="modal-overlay" id="ready-date-confirm-modal" role="dialog" aria-labelledby="ready-date-confirm-title" aria-modal="true" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 1005; align-items: center; justify-content: center; padding: 16px;">
  <div class="card" style="max-width: 480px; width: 100%; padding: 24px;">
    <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;">
      <span style="flex-shrink: 0; width: 40px; height: 40px; border-radius: var(--radius-md, 8px); background: var(--warning-bg, rgba(245, 158, 11, 0.15)); color: var(--warning, #d97706); display: inline-flex; align-items: center; justify-content: center; font-size: 20px;" aria-hidden="true">&#x26A0;&#xFE0F;</span>
      <div style="flex: 1; min-width: 0;">
        <h2 id="ready-date-confirm-title" style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin: 0 0 8px 0;">Ready date</h2>
        <p style="font-size: 14px; color: var(--text-secondary); margin: 0; line-height: 1.5;">The following product(s) have status <strong>Not ready</strong>. Are you sure you want to use them?</p>
      </div>
    </div>
    <div id="ready-date-confirm-body" class="ready-date-confirm-body" style="margin-bottom: 20px; padding: 12px 16px; background: var(--bg-secondary, #f9fafb); border-radius: var(--radius-md, 8px); border: 1px solid var(--border-light, #e5e7eb); font-size: 14px; color: var(--text-primary); line-height: 1.5; max-height: 200px; overflow-y: auto;">
      <!-- List of items injected by JS -->
    </div>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button type="button" class="btn btn-secondary" id="ready-date-confirm-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="ready-date-confirm-use" style="background: var(--warning, #d97706); border-color: var(--warning, #d97706);">Use anyway</button>
    </div>
  </div>
</div>
