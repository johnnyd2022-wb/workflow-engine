<!-- Single source for delete-doc confirmation; include once per page that needs it (create-process flow, SPA). -->
<div class="modal-overlay" id="delete-doc-confirm-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 1004; align-items: center; justify-content: center; padding: 16px;">
  <div class="card" style="max-width: 420px; width: 90%; padding: 24px;">
    <h2 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin: 0 0 12px 0;">Remove documentation?</h2>
    <p style="font-size: 14px; color: var(--text-secondary); margin: 0 0 20px 0; line-height: 1.5;">Remove this documentation from the step? This cannot be undone.</p>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button type="button" class="btn btn-secondary" id="delete-doc-confirm-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="delete-doc-confirm-remove" style="background: var(--error, #dc2626); border-color: var(--error, #dc2626);">Remove</button>
    </div>
  </div>
</div>
