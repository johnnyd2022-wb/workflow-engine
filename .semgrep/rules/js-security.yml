rules:

  # ── XSS ──────────────────────────────────────────────────────────────────────

  - id: innerhtml-template-literal
    languages: [javascript]
    severity: WARNING
    message: >
      innerHTML assigned a template literal. If any ${...} interpolation contains
      API or user data this is an XSS vector. Use textContent for plain text, or
      build nodes with createElement/appendChild. Static strings with no
      interpolations are acceptable but prefer textContent to avoid future risk.
    pattern: $EL.innerHTML = `...`

  - id: innerhtml-string-concat
    languages: [javascript]
    severity: WARNING
    message: >
      innerHTML assigned via string concatenation. If any concatenated value comes
      from API or user data this is an XSS vector. Use textContent for plain text,
      or build nodes with createElement/appendChild.
    pattern-either:
      - pattern: $EL.innerHTML = $A + $B
      - pattern: $EL.innerHTML = $A + $B + $C

  - id: insertadjacenthtml
    languages: [javascript]
    severity: WARNING
    message: >
      insertAdjacentHTML parses raw HTML and is an XSS vector if any argument
      contains user or API data. Prefer DOM APIs (createElement/appendChild/textContent).
    pattern: $EL.insertAdjacentHTML(...)

  # ── CSRF / FETCH ─────────────────────────────────────────────────────────────

  - id: raw-fetch-post
    languages: [javascript]
    severity: ERROR
    message: >
      Raw fetch() used for a mutating request — the CSRF token will be missing,
      causing 400/403 failures. Use CoreAPI.request() for /api/core/* endpoints.
      For other blueprints (CRM, workflow-engine) read the token from
      meta[name="csrf-token"] and pass it as the X-CSRFToken header.
    paths:
      exclude:
        - "**/core-api.js"
        - "**/execution-shared-utils.js"
    patterns:
      - pattern: |
          fetch($URL, {method: $METHOD, ...})
      - metavariable-regex:
          metavariable: $METHOD
          regex: "(?i)^(\"|')(post|put|patch|delete)(\"|')$"

  # ── SENSITIVE STORAGE ────────────────────────────────────────────────────────

  - id: localstorage-sensitive-key
    languages: [javascript]
    severity: WARNING
    message: >
      Storing a potentially sensitive value in localStorage. localStorage is
      accessible to any script on the page. Never store session tokens, CSRF
      secrets, or API keys here — only UI preferences (theme, sidebar state).
    patterns:
      - pattern: localStorage.setItem($KEY, ...)
      - metavariable-regex:
          metavariable: $KEY
          regex: "(?i)(token|secret|password|credential|auth|session|api.?key|jwt|bearer)"

  # ── QUERY STRINGS ────────────────────────────────────────────────────────────

  - id: url-string-concat-query
    languages: [javascript]
    severity: WARNING
    message: >
      User-supplied value concatenated into a URL query string.
      Use URLSearchParams or encodeURIComponent to prevent injection and encoding
      bugs: '/inventory?' + new URLSearchParams({ q: searchValue })
    patterns:
      - pattern: $BASE + $PARAM
      - metavariable-regex:
          metavariable: $BASE
          regex: "\\?.*="
