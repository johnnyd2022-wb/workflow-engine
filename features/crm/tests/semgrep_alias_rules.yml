rules:
  # Rule 1: Detect direct database access to aliases column (filter by file path)
  - id: alias-direct-db-access
    patterns:
      - pattern-either:
          - pattern-regex: |
              cursor\.execute.*SELECT.*aliases.*FROM.*crm_customers
          - pattern-regex: |
              cursor\.execute.*UPDATE.*crm_customers.*SET.*aliases
          - pattern-regex: |
              cursor\.execute.*INSERT.*INTO.*crm_customers.*aliases
          - pattern-regex: |
              cursor\.execute.*DELETE.*FROM.*crm_customers.*aliases
    paths:
      include:
        - "**/features/**/*.py"
      exclude:
        - "**/tests/**"
    message: |
      Direct database access to aliases column detected outside of designated API layer. 
      Use the new alias API endpoints instead:
      - GET /api/crm/customers/<customer_name>/aliases
      - POST /api/crm/customers/<customer_name>/aliases
      - PUT /api/crm/customers/<customer_name>/aliases/<alias_name>
      - DELETE /api/crm/customers/<customer_name>/aliases/<alias_name>
    languages: [python]
    severity: ERROR

  # Rule 2: Detect legacy route patterns for alias operations  
  - id: alias-legacy-routes
    patterns:
      - pattern-regex: |
          @.*route\(["\'][^"\']*(?!api/crm/customers).*crm.*alias[^"\']*["\']
    paths:
      include:
        - "**/features/**/*.py"
      exclude:
        - "**/tests/**"
    message: |
      Legacy alias route detected. These routes should be removed.
      Use the new alias API endpoints instead:
      - GET /api/crm/customers/<customer_name>/aliases
      - POST /api/crm/customers/<customer_name>/aliases
      - PUT /api/crm/customers/<customer_name>/aliases/<alias_name>
      - DELETE /api/crm/customers/<customer_name>/aliases/<alias_name>
    languages: [python]
    severity: ERROR

  # Rule 3: Detect frontend calling legacy alias routes  
  - id: alias-frontend-bypass
    patterns:
      - pattern-either:
          - patterns:
              - pattern-regex: |
                  fetch\(["\'][^"\']*alias[^"\']*["\']
              - pattern-regex: |
                  \$\.[^(]*\(["\'][^"\']*alias[^"\']*["\']
              - pattern-regex: |
                  \.ajax[^}]*url:\s*["\'][^"\']*alias[^"\']*["\']
    paths:
      include:
        - "**/features/**/*.html"
        - "**/features/**/*.js"
    message: |
      Frontend calling legacy alias routes detected.
      Use the new alias API endpoints instead:
      - GET /api/crm/customers/<customer_name>/aliases
      - POST /api/crm/customers/<customer_name>/aliases
      - PUT /api/crm/customers/<customer_name>/aliases/<alias_name>
      - DELETE /api/crm/customers/<customer_name>/aliases/<alias_name>
    languages: [javascript, html]
    severity: ERROR

  # Rule 4: Detect alias manipulation outside of API layer
  - id: alias-direct-manipulation-outside-api
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(...):
                ...
                $CURSOR.execute("SELECT aliases FROM crm_customers ...")
                ...
                aliases = $CURSOR.fetchone()[0]
                ...
                aliases.append(...)
                ...
                $CURSOR.execute("UPDATE crm_customers SET aliases = ...")
          - pattern: |
              def $FUNC(...):
                ...
                $CURSOR.execute("SELECT aliases FROM crm_customers ...")
                ...
                aliases = $CURSOR.fetchone()[0]
                ...
                aliases.remove(...)
                ...
                $CURSOR.execute("UPDATE crm_customers SET aliases = ...")
    paths:
      include:
        - "**/features/**/*.py"
      exclude:
        - "**/tests/**"
    message: |
      Function detected that directly manipulates aliases in database outside of API layer.
      This should use the new alias API endpoints instead.
      Consider refactoring to call the API endpoints or move logic to the API layer.
    languages: [python]
    severity: WARNING

  # Rule 5: Detect SQL queries referencing aliases outside API layer
  - id: alias-sql-references-outside-api
    patterns:
      - pattern-either:
          - pattern: |
              """
              SELECT ... aliases ...
              FROM crm_customers
              """
          - pattern: |
              """
              UPDATE crm_customers
              SET aliases = ...
              """
          - pattern: |
              """
              INSERT INTO crm_customers
              ... aliases ...
              """
    paths:
      include:
        - "**/features/**/*.py"
      exclude:
        - "**/tests/**"
    message: |
      SQL query directly referencing aliases column detected outside of API layer.
      This should use the new alias API endpoints instead.
    languages: [python]
    severity: WARNING

  # Rule 6: Confirm correct API endpoint usage (positive check)
  - id: alias-api-usage-confirmed
    patterns:
      - pattern-regex: |
          fetch\(["\'][^"\']*\/api\/crm\/customers[^"\']*["\']
    paths:
      include:
        - "**/features/**/*.html"
        - "**/features/**/*.js"
    message: |
      ✓ Confirmed correct usage of new alias API endpoint.
    languages: [javascript, html]
    severity: INFO

  # Rule 7: Backend functions that manipulate aliases lists
  - id: alias-manipulation-functions
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(...):
                ...
                aliases = ...
                aliases.append($ALIAS)
          - pattern: |
              def $FUNC(...):
                ...
                aliases = ...
                aliases.remove($ALIAS)
          - pattern: |
              def $FUNC(...):
                ...
                aliases = ...
                aliases.insert($INDEX, $ALIAS)
    paths:
      include:
        - "**/features/**/*.py"
      exclude:
        - "**/tests/**"
    message: |
      Function detected that directly manipulates aliases list.
      Consider using the alias API endpoints instead for better consistency and validation.
    languages: [python]
    severity: INFO

  # Rule 8: Detect legacy Flask route patterns for alias operations
  - id: flask-alias-route-missing-api
    message: |
      Security/Maintenance Alert: This Flask route contains 'alias' in the URL but 
      is missing the expected 'api' prefix. All routes containing 'alias' should 
      be part of the official API and include 'api' in their path for consistency.
    languages:
      - python
    severity: ERROR
    patterns:
      - pattern-regex: crm_bp.route(.*alias.*)
      - pattern-not-regex: /api/
    paths:
      include:
        - "**/*.py"
      exclude:
        - "**/tests/**"