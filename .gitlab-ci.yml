# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
#
# ci-gate discovery mapping (2026-07-12), see .claude/skills/ci-gate/SKILL.md:
#   app db url:   assembled from app/config/<ENVIRONMENT>.ini [database] host/port/name/user/password
#                 (app/utils/config_loader.py), not a single DATABASE_URL env var
#   alembic url:  same app/config/<ENVIRONMENT>.ini, built in app/core/db/migrations/env.py:40+
#                 (alembic.ini's sqlalchemy.url is an unused placeholder)
#   test config:  ENVIRONMENT=test selects app/config/test.ini; ci/setup_database.sh sed-patches
#                 host->postgres, port->5432 for the GitLab service container before migrating
stages:
- test
- security
- migrations
- build
- deploy

variables:
  # Pinned (not floating `pip install uv`) so every job resolves the lockfile the same
  # way and `uv audit` (preview-stage as of this pin) is guaranteed present. Bump
  # deliberately, not via drift — see the uv-audit-migration workstream in
  # .agents/plans/repo-modernisation-plan.md.
  UV_VERSION: "0.11.29"

include:
- template: Security/SAST.gitlab-ci.yml

sast:
  stage: test

# Guards that uv.lock still matches pyproject.toml -- catches an edited pyproject that
# never got re-locked. This is a consistency check, not an upgrade check: it does NOT
# look for newer versions (that's Renovate's job, see .agents/plans/repo-modernisation-plan.md
# §3) and Renovate does not replace it -- Renovate's own MRs still need to pass this.
lockfile_consistency:
  image: python:3.14-bookworm
  script:
    - pip install "uv==${UV_VERSION}"
    - uv lock --check
  only:
    - schedules
    - merge_requests
  allow_failure: true

# Renovate: proposes dependency/Docker-base-image/pre-commit-hook version bumps as MRs
# on a schedule (config: renovate.json). Distinct from check_dependency_updates above,
# which only checks uv.lock is in sync -- this looks for newer versions to upgrade to.
# Needs a GitLab pipeline schedule (Settings > CI/CD > Schedules) targeting this job's
# ref, and a RENOVATE_TOKEN CI/CD variable (masked, protected) holding a project or
# group access token with `api` scope + Developer/Maintainer role, so Renovate can open
# MRs. Neither is set up by this file -- both are account-level actions for a human.
renovate:
  stage: test
  image: renovate/renovate:latest
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "${CI_SERVER_URL}/api/v4"
    RENOVATE_TOKEN: "${RENOVATE_TOKEN}"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "${CI_PROJECT_PATH}"
  script:
    - renovate
  only:
    - schedules
  allow_failure: true

# Run ruff linter
# Note: This checks only. To auto-fix locally, run: uv run workflow lint --fix
ruff:
  stage: test
  image: python:3.14-bookworm
  script:
    - pip install "uv==${UV_VERSION}"
    - uv sync --extra dev
    - uv run ruff check app/ --fix
    - uv run ruff format app/
  only:
    - merge_requests
    - main
  allow_failure: false

# Guard the agent-written data stores (AER metrics ledger + findings history). These are
# append-only JSONL that unattended skills write; a malformed line should fail fast here
# rather than silently corrupt a scorecard or suppress the wrong finding. Stdlib-only.
data_stores:
  stage: test
  image: python:3.14-bookworm
  script:
    - python3 scripts/skill_metrics.py --check
    - python3 scripts/finding_history.py --check
  only:
    - merge_requests
    - main
  allow_failure: false

unit_tests:
  stage: test
  image: python:3.14-bookworm
  services:
    - name: postgres:16
      alias: postgres
      command: ["postgres", "-c", "max_connections=200"]
  variables:
    # Set environment to use test.ini config
    ENVIRONMENT: test
    # Database connection for GitLab CI service
    # Service containers are accessible via their alias as hostname
    POSTGRES_DB: workflow-engine-test
    POSTGRES_USER: workflow_rw
    POSTGRES_PASSWORD: secret
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    # Install dependencies
    - pip install "uv==${UV_VERSION}"
    - uv sync --extra dev
    # Install PostgreSQL client and curl for health checks
    - apt-get update -o Acquire::AllowInsecureRepositories=true -qq && apt-get install -y -qq postgresql-client curl openssl ca-certificates
    # Node.js for tests/js/*.test.js (node --test); see tests/test_execution_shared_utils_js.py
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    # Make CI scripts executable
    - chmod +x ci/*.sh
    # Setup database (wait for postgres, update config, run migrations)
    - ./ci/setup_database.sh
    # Setup and start Flask server (generate certs, start server, wait for ready)
    - ./ci/setup_server.sh
  script:
    - ENVIRONMENT=test uv run pytest tests/ -v
  after_script:
    # Clean up: Stop Flask server
    - ./ci/cleanup_server.sh
  only:
    - merge_requests
    - main
  allow_failure: false

semgrep:
  stage: security
  image: semgrep/semgrep:latest
  script:
    - semgrep --config .semgrep/rules/ app/ --include="*.py" --include="*.js" --error
  only:
    - merge_requests
    - main
  allow_failure: false

semgrep_observability:
  stage: security
  image: semgrep/semgrep:latest
  script:
    - semgrep --config .semgrep/rules/observability.yml app/ --include="*.py" --severity ERROR --error
  only:
    - merge_requests
    - main
  allow_failure: false

# Learning loop (AER Phase 2): every finding-born rule in .semgrep/rules/learned.yml must
# prove it fires on its vulnerable fixture and stays silent on the fixed one. An untested
# learned rule is decorative — green in the config while catching nothing. This gate makes
# "write the rule, prove it catches the bug" (security-audit §3) mechanical, not a promise.
semgrep_learned_rules:
  stage: security
  image: semgrep/semgrep:latest
  script:
    - python3 scripts/rule_candidates.py verify
  only:
    - merge_requests
    - main
  allow_failure: false

# Secret scanning — added by ci-gate. First run scanning full history found 32
# pre-existing findings that predate this job (git history was never scanned before).
# Rather than weaken the gate, this job is scoped to only the commits actually being
# introduced (the MR's diff range, or the pushed range on main) — full-history scanning
# stays a separate, deliberate one-off (see .agents/ci-gate-setup.md), not a per-MR gate
# that would keep blocking everyone on a backlog they didn't create. GIT_DEPTH: 0 (full
# clone) so the diff base commit is always present to compute the range against.
gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        RANGE="$CI_MERGE_REQUEST_DIFF_BASE_SHA..$CI_COMMIT_SHA"
      elif [ -n "$CI_COMMIT_BEFORE_SHA" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        RANGE="$CI_COMMIT_BEFORE_SHA..$CI_COMMIT_SHA"
      else
        RANGE="$CI_COMMIT_SHA"
      fi
      echo "gitleaks scanning commit range: $RANGE"
      gitleaks detect --source . --no-banner --log-opts="$RANGE"
  only:
    - merge_requests
    - main
  allow_failure: false

# Known-vulnerability scanning of resolved dependencies via uv's native OSV-backed
# scanner (replaces pip-audit — same OSV data source, ~4-10x faster, no extra install).
# Distinct from lockfile_consistency above, which only checks the lockfile is in sync.
# Blocking: `uv audit` is preview-stage in the pinned uv version (UV_VERSION above) —
# the protection against that instability is the version pin, not allow_failure, per
# the explicit decision in .agents/plans/repo-modernisation-plan.md §1. A finding here
# routes to the dependency-update skill, same as the old pip_audit job did.
uv_audit:
  stage: security
  image: python:3.14-bookworm
  script:
    - pip install "uv==${UV_VERSION}"
    - uv sync --extra dev
    - mkdir -p .agents/reports/security
    - >
      uv audit --frozen --output-format json
      --preview-features audit-command,json-output
      > .agents/reports/security/uv-audit.json
      || (cat .agents/reports/security/uv-audit.json; exit 1)
  artifacts:
    paths:
      - .agents/reports/security/uv-audit.json
    when: always
    expire_in: 30 days
  only:
    - merge_requests
    - main
  allow_failure: false

# Supply-chain BEHAVIOUR analysis (Socket) -- the proactive layer pip_audit/uv_audit
# can't provide. Those scan for already-published CVEs (reactive, days-to-weeks lag from
# disclosure to database entry); Socket inspects what a package's installed code actually
# *does* (network calls, install scripts, obfuscation, telemetry) and flags red flags
# before any CVE exists for them -- see docs/supply-chain-security.md for the full
# division of labour.
#
# main-only, deliberately not merge_requests: SOCKET_SECURITY_API_TOKEN is a protected
# CI/CD variable (correctly so -- it's a real credential), and GitLab only exposes
# protected variables to pipelines running on protected branches. An MR pipeline runs
# against the *source* branch, which is essentially never protected, so scoping this to
# merge_requests too would just mean it fails on every MR with "token not found" --
# discovered by watching it do exactly that on this branch's own MR pipeline. Restricting
# to main means it only ever runs where the token is actually available, as part of the
# same post-merge pipeline that also builds/deploys (see chore/registry-cd-pipeline) --
# effectively a CD-stage check now, not a pre-merge gate. `main` is a protected branch
# (push: no one, merge: Maintainers) as of this commit, which is what makes this work at
# all; it wasn't previously (see .agents/ci-gate-setup.md's "Flagged to Johnny" section,
# item 3 -- this closes that out).
#
# NEEDS HUMAN SETUP before this job can run (not done by this commit):
#   1. Create a socket.dev account/org (Free tier covers full behavioural scanning --
#      see docs/supply-chain-security.md for the tier breakdown and upgrade triggers).
#   2. Add SOCKET_SECURITY_API_TOKEN as a masked, protected GitLab CI/CD variable.
socket_security:
  stage: security
  image: python:3.14-bookworm
  script:
    - pip install socketsecurity
    - mkdir -p .agents/reports/security
    - >
      socketcli
      --integration gitlab
      --repo "${CI_PROJECT_PATH}"
      --branch "${CI_COMMIT_REF_NAME}"
      --commit-sha "${CI_COMMIT_SHA}"
      --enable-json --json-file .agents/reports/security/socket.json
  artifacts:
    paths:
      - .agents/reports/security/socket.json
    when: always
    expire_in: 30 days
  only:
    - main
  # Soak first: behavioural heuristics can flag a legitimate package (a false positive
  # is a judgement call, not a wrong-vs-right CVE match), same reasoning pip_audit
  # started with. Flip to allow_failure: false once a soak period shows the signal is
  # clean, per .agents/plans/repo-modernisation-plan.md §2.
  allow_failure: true

# Proves migrations are reversible, not just applicable — added by ci-gate.
# ci/setup_database.sh already brings the schema to head; this then proves one step
# down and back up round-trips cleanly.
migration_reversibility:
  stage: migrations
  image: python:3.14-bookworm
  services:
    - name: postgres:16
      alias: postgres
      command: ["postgres", "-c", "max_connections=200"]
  variables:
    ENVIRONMENT: test
    POSTGRES_DB: workflow-engine-test
    POSTGRES_USER: workflow_rw
    POSTGRES_PASSWORD: secret
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - pip install "uv==${UV_VERSION}"
    - uv sync --extra dev
    - apt-get update -o Acquire::AllowInsecureRepositories=true -qq && apt-get install -y -qq postgresql-client
    - chmod +x ci/*.sh
    - ./ci/setup_database.sh
  script:
    - ENVIRONMENT=test uv run alembic downgrade -1
    - ENVIRONMENT=test uv run alembic upgrade head
  only:
    - merge_requests
    - main
  allow_failure: false

# ============================================================================
# CD: build stage (main only -- registry pushes for merged code, never MR branches)
# ============================================================================
#
# One image REPOSITORY per app ($CI_REGISTRY_IMAGE/app), environment-prefixed
# IMMUTABLE tags (test-<sha>, prod-<sha>) -- not a shared registry of unrelated
# images, and not a single floating `:latest` a deploy blindly trusts. The SHA tag
# is what every deploy job below actually pulls, which is what makes "never deploy
# a failing artifact" enforceable: the thing that gets tested is addressed by the
# exact same identifier the thing that gets deployed pulls.
#
# docker:dind is the portable choice here since this file doesn't know this
# runner's exact privileges -- if the runner already has host docker socket access
# (plausible for a runner colocated with the deploy target), dind is unnecessary
# overhead and can be dropped in favour of a shell-executor job. Flagged, not
# assumed either way.
#
# CI_REGISTRY_USER / CI_REGISTRY_PASSWORD / CI_REGISTRY are auto-populated by
# GitLab for every job once the project's Container Registry is enabled -- no
# manual token needed for this part, unlike Renovate/Socket below.
docker_build_publish:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --target test -f Dockerfile.multi -t "$CI_REGISTRY_IMAGE/app:test-$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/app:test-$CI_COMMIT_SHORT_SHA"
    - docker build --target production -f Dockerfile.multi -t "$CI_REGISTRY_IMAGE/app:prod-$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/app:prod-$CI_COMMIT_SHORT_SHA"
  only:
    - main

# ============================================================================
# CD: deploy stage -- decoupled from CI (pulls the built artifact, never rebuilds),
# auto-deploys to test on every green main merge, gates promotion on a real
# Playwright run against the deployed container, and rolls back automatically if
# that gate fails. See docs/deploy-registry-cd.md for the full flow and the
# `:test-stable` promotion model.
#
# `deploy-target` runner: a second [[runners]] entry on this project's existing
# self-hosted runner container, executor = "shell" (not docker -- the docker
# executor spins up a fresh per-job container with no host docker.sock access,
# which can't cycle the real host containers a tunnel/DNS actually points at;
# shell executor runs directly in the runner's own environment, which does have
# it). Also needed inside that runner container: the `docker` CLI (the image
# ships without one -- installed via apt) and DOCKER_API_VERSION=1.43 set as a
# runner-level `environment` in config.toml (the apt-installed CLI defaults to a
# newer API than this host's Docker 24.0.5 daemon supports).
#
# PostHog is deliberately NOT wired up here: it's optional (an empty key just
# disables client-side RUM, no crash -- see scripts/deploy_test_simple.sh) and
# CD has no local KeePassXC to resolve it from, so it's simply not requested.
#
# STILL NEEDS HUMAN SETUP:
#   XERO_CLIENT_ID_TEST / XERO_CLIENT_SECRET_TEST (and lowercase pair) as masked
#   CI/CD variables, if the Xero OAuth flow needs to work in the deployed test
#   container. Optional in the same sense PostHog is -- omitting them just means
#   Xero connect won't complete, nothing else breaks.
# ============================================================================

deploy_test:
  stage: deploy
  image: docker:27
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - ./scripts/deploy_test_simple.sh "$CI_REGISTRY_IMAGE/app:test-$CI_COMMIT_SHORT_SHA"
  environment:
    name: test
    url: https://test-workflow-engine.whistlebird.co.nz
  needs: ["docker_build_publish"]
  only:
    - main
  tags:
    - deploy-target  # registered: project runner id 54420399, shell executor, on this project's self-hosted box

# Ground-truth verification of the DEPLOYED container (not a fresh in-process
# app) -- see tests/e2e/conftest.py's E2E_BASE_URL fixture path and its commit
# message for why that distinction needed a real code fix first.
cd_e2e:
  stage: deploy
  image: python:3.14-bookworm
  script:
    - pip install "uv==${UV_VERSION}"
    - uv sync --extra dev
    - uv run playwright install --with-deps chromium
    - E2E_BASE_URL=https://localhost:8001 uv run pytest tests/e2e/test_smoke.py -v
  needs: ["deploy_test"]
  only:
    - main
  tags:
    - deploy-target  # must be the SAME runner as deploy_test (hits localhost:8001)

# Promotion: only a green cd_e2e moves the `:test-stable` tag forward. Nothing
# else in this file ever writes that tag -- it is only ever moved here, and only
# on success, which is what makes it trustworthy as "the last deploy that passed
# Playwright against the real container."
promote_test_stable:
  stage: deploy
  image: docker:27
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "$CI_REGISTRY_IMAGE/app:test-$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE/app:test-$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/app:test-stable"
    - docker push "$CI_REGISTRY_IMAGE/app:test-stable"
  needs: ["cd_e2e"]
  only:
    - main
  tags:
    - deploy-target

# Automatic rollback: fires only when cd_e2e failed (the Playwright gate on the
# just-deployed candidate), redeploying whatever :test-stable currently points
# at -- which promote_test_stable above never advanced to the broken candidate,
# since it never ran. The broken artifact does not stay live.
rollback_test_on_failure:
  stage: deploy
  image: docker:27
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - echo "cd_e2e failed -- rolling back to last known-good :test-stable"
    - ./scripts/deploy_test_simple.sh "$CI_REGISTRY_IMAGE/app:test-stable"
  needs: ["cd_e2e"]
  when: on_failure
  only:
    - main
  tags:
    - deploy-target
