[project]
name = "workflow-engine"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "alembic>=1.17.2",
    "authlib==1.2.1",
    "click==8.1.7",
    "docker==6.1.3",
    "flask==2.3.3",
    "psycopg2-binary==2.9.7",
    "requests==2.31.0",
    "sqlalchemy==2.0.19",
    "xero-python==4.0.0",
]

[project.scripts]
workflow = "app.cli:cli"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.uv]
package = true
